<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球各大洲分区互动地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        #map { height: 100vh; width: 100%; background: #aad3df; }

        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            max-width: 240px;
            max-height: 80vh;
            overflow-y: auto;
        }
        h3 { margin-top: 0; font-size: 16px; text-align: center; color: #333; }
        .continent-section {
            margin-bottom: 10px;
        }
        .continent-title {
            font-weight: bold;
            font-size: 14px;
            margin: 5px 0;
            color: #555;
            cursor: pointer;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 6px 0;
            margin-bottom: 3px;
            border: none;
            background-color: #f0f0f0;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 13px;
            text-align: left;
            padding-left: 10px;
        }
        .btn:hover { background-color: #e0e0e0; }
        .btn.active {
            background-color: #ff5722;
            color: white;
            font-weight: bold;
        }
        #info-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="control-panel">
        <h3>全球分区选择</h3>
        <!-- 亚洲 -->
        <div class="continent-section">
            <div class="continent-title">🌏 亚洲</div>
            <button class="btn" data-region="East Asia" onclick="highlightRegion('East Asia')">东亚 (5国)</button>
            <button class="btn" data-region="Southeast Asia" onclick="highlightRegion('Southeast Asia')">东南亚 (11国)</button>
            <button class="btn" data-region="South Asia" onclick="highlightRegion('South Asia')">南亚 (7国)</button>
            <button class="btn" data-region="Central Asia" onclick="highlightRegion('Central Asia')">中亚 (5国)</button>
            <button class="btn" data-region="West Asia" onclick="highlightRegion('West Asia')">西亚 (20国)</button>
        </div>
        <!-- 欧洲 -->
        <div class="continent-section">
            <div class="continent-title">🇪🇺 欧洲</div>
            <button class="btn" data-region="North Europe" onclick="highlightRegion('North Europe')">北欧 (5国)</button>
            <button class="btn" data-region="East Europe" onclick="highlightRegion('East Europe')">东欧 (7国)</button>
            <button class="btn" data-region="Central Europe" onclick="highlightRegion('Central Europe')">中欧 (8国)</button>
            <button class="btn" data-region="West Europe" onclick="highlightRegion('West Europe')">西欧 (7国)</button>
            <button class="btn" data-region="South Europe" onclick="highlightRegion('South Europe')">南欧 (17国)</button>
        </div>
        <!-- 北美洲 -->
        <div class="continent-section">
            <div class="continent-title">🌎 北美洲</div>
            <button class="btn" data-region="North America Core" onclick="highlightRegion('North America Core')">核心板块 (4)</button>
            <button class="btn" data-region="Central America" onclick="highlightRegion('Central America')">中美洲 (7国)</button>
            <button class="btn" data-region="Caribbean Big" onclick="highlightRegion('Caribbean Big')">加勒比大国 (5)</button>
            <button class="btn" data-region="Caribbean Small" onclick="highlightRegion('Caribbean Small')">加勒比小国 (8)</button>
        </div>
        <!-- 南美洲 -->
        <div class="continent-section">
            <div class="continent-title">🌎 南美洲</div>
            <button class="btn" data-region="South America" onclick="highlightRegion('South America')">全洲 (12国)</button>
        </div>
        <!-- 大洋洲 -->
        <div class="continent-section">
            <div class="continent-title">🌊 大洋洲</div>
            <button class="btn" data-region="Oceania Big" onclick="highlightRegion('Oceania Big')">三巨头 (3国)</button>
            <button class="btn" data-region="Melanesia" onclick="highlightRegion('Melanesia')">美拉尼西亚 (4)</button>
            <button class="btn" data-region="Micronesia" onclick="highlightRegion('Micronesia')">密克罗尼西亚 (4)</button>
            <button class="btn" data-region="Polynesia" onclick="highlightRegion('Polynesia')">波利尼西亚 (5)</button>
        </div>
        <!-- 非洲 -->
        <div class="continent-section">
            <div class="continent-title">🌍 非洲</div>
            <button class="btn" data-region="North Africa" onclick="highlightRegion('North Africa')">北非 (6国)</button>
            <button class="btn" data-region="West Africa" onclick="highlightRegion('West Africa')">西非 (16国)</button>
            <button class="btn" data-region="East Africa" onclick="highlightRegion('East Africa')">东非 (18国)</button>
            <button class="btn" data-region="Central Africa" onclick="highlightRegion('Central Africa')">中非 (9国)</button>
            <button class="btn" data-region="South Africa Region" onclick="highlightRegion('South Africa Region')">南非 (5国)</button>
        </div>
        <button class="btn" style="margin-top:10px; border:1px solid #ccc; background:#fff;" onclick="resetMap()">🗺️ 重置视图</button>
    </div>
    <div id="info-box">正在联网加载全球边界数据...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>

        // ---------- 完整的区域定义 ----------

            "East Africa": ["Eritrea", "Ethiopia", "South Sudan", "Djibouti", "Somalia", "Kenya", "Uganda", "Rwanda", "Burundi", "Tanzania", "Zambia", "Zimbabwe", "Malawi", "Mozambique", "Madagascar", "Seychelles", "Mauritius", "Comoros"],
            "Central Africa": ["Angola", "Republic of the Congo", "Congo", "Democratic Republic of the Congo", "Equatorial Guinea", "Gabon", "Central African Republic", "Chad", "Cameroon", "Sao Tome and Principe"],

        const regionNamesCN = {

            "North Europe": "北欧", "East Europe": "东欧", "Central Europe": "中欧", "West Europe": "西欧", "South Europe": "南欧",
            "North America Core": "北美核心", "Central America": "中美洲", "Caribbean Big": "加勒比大国", "Caribbean Small": "加勒比小国",
            "South America": "南美洲",
            "Oceania Big": "大洋洲三巨头", "Melanesia": "美拉尼西亚", "Micronesia": "密克罗尼西亚", "Polynesia": "波利尼西亚",
            "North Africa": "北非", "West Africa": "西非", "East Africa": "东非", "Central Africa": "中非", "South Africa Region": "南非"
        };

        // ---------- 完善的国家中英文对照 (尽可能覆盖) ----------
        const countryNamesCN = {
            // 亚洲
            "China": "中国", "Taiwan": "台湾", "Japan": "日本", "South Korea": "韩国", "Korea": "韩国", "Republic of Korea": "韩国",
            "North Korea": "朝鲜", "Democratic People's Republic of Korea": "朝鲜", "Mongolia": "蒙古",
            "Vietnam": "越南", "Laos": "老挝", "Cambodia": "柬埔寨", "Thailand": "泰国", "Myanmar": "缅甸", "Burma": "缅甸",
            "Malaysia": "马来西亚", "Singapore": "新加坡", "Indonesia": "印度尼西亚", "Philippines": "菲律宾",
            "Brunei": "文莱", "Timor-Leste": "东帝汶", "East Timor": "东帝汶",

            "Sri Lanka": "斯里兰卡", "Maldives": "马尔代夫",
            "Kazakhstan": "哈萨克斯坦", "Kyrgyzstan": "吉尔吉斯斯坦", "Tajikistan": "塔吉克斯坦", "Uzbekistan": "乌兹别克斯坦", "Turkmenistan": "土库曼斯坦",
            "Afghanistan": "阿富汗", "Iran": "伊朗", "Iraq": "伊拉克", "Kuwait": "科威特",
            "Georgia": "格鲁吉亚", "Armenia": "亚美尼亚", "Azerbaijan": "阿塞拜疆",
            "Turkey": "土耳其", "Syria": "叙利亚", "Jordan": "约旦", "Israel": "以色列",
            "Palestine": "巴勒斯坦", "Lebanon": "黎巴嫩", "Cyprus": "塞浦路斯",
            "Saudi Arabia": "沙特阿拉伯", "Yemen": "也门", "Oman": "阿曼",
            "United Arab Emirates": "阿联酋", "UAE": "阿联酋", "Qatar": "卡塔尔", "Bahrain": "巴林",
            // 欧洲
            "Finland": "芬兰", "Sweden": "瑞典", "Norway": "挪威", "Iceland": "冰岛", "Denmark": "丹麦",
            "Estonia": "爱沙尼亚", "Latvia": "拉脱维亚", "Lithuania": "立陶宛", "Belarus": "白俄罗斯",
            "Russia": "俄罗斯", "Ukraine": "乌克兰", "Moldova": "摩尔多瓦",
            "Germany": "德国", "Poland": "波兰", "Czech Republic": "捷克", "Slovakia": "斯洛伐克",
            "Austria": "奥地利", "Hungary": "匈牙利", "Switzerland": "瑞士", "Liechtenstein": "列支敦士登",
            "United Kingdom": "英国", "Ireland": "爱尔兰", "Netherlands": "荷兰", "Belgium": "比利时",
            "Luxembourg": "卢森堡", "France": "法国", "Monaco": "摩纳哥",
            "Spain": "西班牙", "Portugal": "葡萄牙", "Andorra": "安道尔",
            "Italy": "意大利", "Vatican City": "梵蒂冈", "San Marino": "圣马力诺", "Malta": "马耳他",
            "Slovenia": "斯洛文尼亚", "Croatia": "克罗地亚", "Bosnia and Herzegovina": "波黑",
            "Montenegro": "黑山", "Albania": "阿尔巴尼亚", "Romania": "罗马尼亚", "Bulgaria": "保加利亚",
            "Serbia": "塞尔维亚", "North Macedonia": "北马其顿", "Greece": "希腊",
            // 北美洲
            "United States": "美国", "Canada": "加拿大", "Mexico": "墨西哥", "Greenland": "格陵兰",
            "Guatemala": "危地马拉", "Belize": "伯利兹", "El Salvador": "萨尔瓦多", "Honduras": "洪都拉斯",
            "Nicaragua": "尼加拉瓜", "Costa Rica": "哥斯达黎加", "Panama": "巴拿马",
            "Bahamas": "巴哈马", "Cuba": "古巴", "Jamaica": "牙买加", "Haiti": "海地",
            "Dominican Republic": "多米尼加", "Saint Kitts and Nevis": "圣基茨和尼维斯",
            "Antigua and Barbuda": "安提瓜和巴布达", "Dominica": "多米尼克", "Saint Lucia": "圣卢西亚",
            "Saint Vincent and the Grenadines": "圣文森特和格林纳丁斯", "Grenada": "格林纳达",
            "Barbados": "巴巴多斯", "Trinidad and Tobago": "特立尼达和多巴哥",
            // 南美洲
            "Venezuela": "委内瑞拉", "Colombia": "哥伦比亚", "Ecuador": "厄瓜多尔", "Peru": "秘鲁",
            "Chile": "智利", "Guyana": "圭亚那", "Suriname": "苏里南", "Brazil": "巴西",
            "Argentina": "阿根廷", "Paraguay": "巴拉圭", "Uruguay": "乌拉圭", "Bolivia": "玻利维亚",
            // 大洋洲
            "Australia": "澳大利亚", "Papua New Guinea": "巴布亚新几内亚", "New Zealand": "新西兰",
            "Solomon Islands": "所罗门群岛", "Vanuatu": "瓦努阿图", "Fiji": "斐济", "Niue": "纽埃",
            "Palau": "帕劳", "Micronesia": "密克罗尼西亚联邦", "Marshall Islands": "马绍尔群岛", "Nauru": "瑙鲁",
            "Samoa": "萨摩亚", "Tonga": "汤加", "Tuvalu": "图瓦卢", "Kiribati": "基里巴斯", "Cook Islands": "库克群岛",
            // 非洲
            "Egypt": "埃及", "Sudan": "苏丹", "Libya": "利比亚", "Tunisia": "突尼斯", "Algeria": "阿尔及利亚", "Morocco": "摩洛哥",
            "Nigeria": "尼日利亚", "Benin": "贝宁", "Ghana": "加纳", "Togo": "多哥", "Côte d'Ivoire": "科特迪瓦", "Ivory Coast": "科特迪瓦",
            "Liberia": "利比里亚", "Sierra Leone": "塞拉利昂", "Guinea": "几内亚", "Guinea-Bissau": "几内亚比绍",
            "Senegal": "塞内加尔", "Gambia": "冈比亚", "Mauritania": "毛里塔尼亚", "Mali": "马里", "Niger": "尼日尔",
            "Cabo Verde": "佛得角", "Cape Verde": "佛得角", "Burkina Faso": "布基纳法索",
            "Eritrea": "厄立特里亚", "Ethiopia": "埃塞俄比亚", "South Sudan": "南苏丹", "Djibouti": "吉布提",
            "Somalia": "索马里", "Kenya": "肯尼亚", "Uganda": "乌干达", "Rwanda": "卢旺达", "Burundi": "布隆迪",
            "Tanzania": "坦桑尼亚", "Zambia": "赞比亚", "Zimbabwe": "津巴布韦", "Malawi": "马拉维",
            "Mozambique": "莫桑比克", "Madagascar": "马达加斯加", "Seychelles": "塞舌尔", "Mauritius": "毛里求斯", "Comoros": "科摩罗",
            "Angola": "安哥拉", "Republic of the Congo": "刚果（布）", "Congo": "刚果", "Democratic Republic of the Congo": "刚果（金）",
            "Equatorial Guinea": "赤道几内亚", "Gabon": "加蓬", "Central African Republic": "中非共和国",
            "Chad": "乍得", "Cameroon": "喀麦隆", "Sao Tome and Principe": "圣多美和普林西比",
            "Botswana": "博茨瓦纳", "Namibia": "纳米比亚", "South Africa": "南非", "Eswatini": "斯威士兰", "Swaziland": "斯威士兰", "Lesotho": "莱索托"
        };

        function getCountryCN(englishName) {
            return countryNamesCN[englishName] || englishName;
        }

        let geojsonLayer;
        let currentActiveRegion = null;
        let activeCountryLayers = [];
        let countryClickedFlag = false;

        function defaultStyle() { return { weight: 1, color: '#999', dashArray: '3', fillOpacity: 0.1, fillColor: '#eee' }; }
        function highlightStyle() { return { weight: 2, color: '#666', dashArray: '', fillOpacity: 0.6, fillColor: '#ff5722' }; }
        function dimStyle() { return { weight: 1, color: '#ccc', dashArray: '', fillOpacity: 0.05, fillColor: '#ddd' }; }

        // 特殊显示区域 (塞浦路斯显示南欧)
        function getDisplayRegion(countryName) {
            if (countryName === 'Cyprus') return 'South Europe';
            return getRegionByCountry(countryName);
        }

        function getRegionByCountry(countryName) {
            for (let region in regions) {
                if (regions[region].includes(countryName)) return region;
            }
            // 尝试英文名反向查找
            const englishName = Object.keys(countryNamesCN).find(key => countryNamesCN[key] === countryName);
            if (englishName) {
                for (let region in regions) {
                    if (regions[region].includes(englishName)) return region;
                }
            }
            return null;
        }

        function resetAllLayersToDefault() {
            if (!geojsonLayer) return;
            geojsonLayer.eachLayer(function(layer) {
                layer.setStyle(defaultStyle());
                layer.currentlyHighlighted = false;
            });
            currentActiveRegion = null;
            activeCountryLayers = [];
        }

        window.highlightRegion = function(regionName) {
            if (!geojsonLayer) return;
            const targetCountries = regions[regionName];
            if (!targetCountries) return;
            activeCountryLayers = [];
            currentActiveRegion = regionName;
            // 按钮激活状态更新
            document.querySelectorAll('.btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-region') === regionName);
            });
            geojsonLayer.eachLayer(function(layer) {
                const name = layer.feature.properties.name || layer.feature.properties.ADMIN;
                if (targetCountries.includes(name)) {
                    layer.setStyle(highlightStyle());
                    layer.currentlyHighlighted = true;
                    layer.bringToFront();
                } else {
                    layer.setStyle(dimStyle());
                    layer.currentlyHighlighted = false;
                }
            });
            document.getElementById('info-box').innerText = `当前展示分区：${regionNamesCN[regionName]}`;
        };

        window.resetMap = function() {
            resetAllLayersToDefault();
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('info-box').innerText = "鼠标悬停查看国家名称，点击国家或上方按钮高亮区域";
        };

        const geojsonUrl = 'https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson';

        fetch(geojsonUrl)
            .then(response => response.json())
            .then(data => {
                geojsonLayer = L.geoJson(data, {
                    onEachFeature: function(feature, layer) {
                        layer.on({
                            mouseover: function(e) {
                                const countryNameEN = feature.properties.name || feature.properties.ADMIN;
                                const regionKey = getDisplayRegion(countryNameEN);
                                const regionText = regionKey ? ` [${regionNamesCN[regionKey]}]` : "";
                                const countryCN = getCountryCN(countryNameEN);
                                document.getElementById('info-box').innerText = 
                                    `当前国家：${countryCN} ${countryNameEN}${regionText}`;
                                if (!layer.currentlyHighlighted) {
                                    layer.setStyle({ weight: 2, color: '#444', fillOpacity: 0.4, fillColor: '#666' });
                                    layer.bringToFront();
                                }
                            },
                            mouseout: function(e) {
                                if (!layer.currentlyHighlighted) {
                                    if (currentActiveRegion) layer.setStyle(dimStyle());
                                    else layer.setStyle(defaultStyle());
                                } else layer.setStyle(highlightStyle());
                            },
                            click: function(e) {
                                countryClickedFlag = true;
                                setTimeout(() => countryClickedFlag = false, 100);

                                const countryNameEN = feature.properties.name || feature.properties.ADMIN;
                                let highlightNames = [];
                                // 亚洲一个中国原则
                                if (countryNameEN === 'China' || countryNameEN === 'Taiwan') {
                                    highlightNames = ['China', 'Taiwan'];
                                } else {
                                    highlightNames = [countryNameEN];
                                }

                                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));

                                geojsonLayer.eachLayer(function(l) {
                                    l.setStyle(defaultStyle());
                                    l.currentlyHighlighted = false;
                                });
                                currentActiveRegion = null;
                                activeCountryLayers = [];

                                geojsonLayer.eachLayer(function(l) {
                                    const name = l.feature.properties.name || l.feature.properties.ADMIN;
                                    if (highlightNames.includes(name)) {
                                        l.setStyle(highlightStyle());
                                        l.currentlyHighlighted = true;
                                        l.bringToFront();
                                        activeCountryLayers.push(l);
                                    }
                                });

                                if (countryNameEN === 'China' || countryNameEN === 'Taiwan') {
                                    document.getElementById('info-box').innerText = `选中国家：中国 China [东亚]`;
                                } else {
                                    const countryCN = getCountryCN(countryNameEN);
                                    const regionKey = getDisplayRegion(countryNameEN);
                                    const regionText = regionKey ? ` [${regionNamesCN[regionKey]}]` : "";
                                    document.getElementById('info-box').innerText = 
                                        `选中国家：${countryCN} ${countryNameEN}${regionText}`;
                                }
                            }
                        });
                    }
                });
                geojsonLayer.eachLayer(layer => layer.setStyle(defaultStyle()));
                geojsonLayer.addTo(map);
                document.getElementById('info-box').innerText = "数据加载完毕。点击国家或按钮高亮区域";
            })
            .catch(error => {
                console.error('Error loading GeoJSON:', error);
                document.getElementById('info-box').innerText = "错误：无法加载线上边界数据。";
            });

        map.on('click', function(e) {
            if (countryClickedFlag) return;
            resetMap();
            document.getElementById('info-box').innerText = "未点中国家。请放大地图后点击国家区域内部。";
        });
    </script>
</body>
</html>
