<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesso's Space - 观影与追番记录</title>
    <style>
        /* 1. 全局与排版：营造呼吸感 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.8; 
            color: #2c3e50;   
            background-color: #fafafa; 
            max-width: 680px; 
            margin: 60px auto;
            padding: 0 20px;
        }

        /* 2. 链接与交互：克制而优雅 */
        a { 
            color: #34495e; 
            text-decoration: none; 
            transition: all 0.2s ease; 
        }
        a:hover { 
            color: #0066cc; 
            text-decoration: none; 
        }

        /* 3. 标题层级 */
        h1 { 
            font-size: 2.2rem; 
            margin-bottom: 8px;
            letter-spacing: -0.5px; 
        }
        .subtitle {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee; 
        }

        /* 4. 记录列表样式：摒弃阴影，使用极简边框与悬停 */
        .record-list {
            list-style: none;
            padding: 0;
        }
        .record-item {
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            transition: transform 0.2s ease, padding-left 0.2s ease;
        }
        .record-item:last-child {
            border-bottom: none;
        }
        /* 悬停时的微小位移，增加灵动感 */
        .record-item:hover {
            padding-left: 8px; 
        }

        .record-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .record-meta {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-bottom: 8px;
            font-family: "SF Mono", "Fira Code", monospace; 
        }
        .record-desc {
            font-size: 0.95rem;
            color: #555;
        }

        /* 5. 底部导航 */
        footer { 
            margin-top: 60px; 
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.85rem; 
            color: #95a5a6; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <header>
        <h1>🎬 观影与追番记录</h1>
        <p class="subtitle">光影与故事，按时间倒序排列。</p>
    </header>

    <main>
        <ul class="record-list">
            <!-- 示例条目 1 -->
            <li class="record-item">
                <div class="record-title">一人之下</div>
                <div class="record-meta">动漫 · 奇幻 / 动作 · ⭐️ 5/5</div>
                <div class="record-desc">将中国传统道家文化与市井烟火气完美融合，人物塑造极具张力，是国漫中难得的硬核佳作。</div>
            </li>

            <!-- 示例条目 2 -->
            <li class="record-item">
                <div class="record-title">屋顶人</div>
                <div class="record-meta">电影 · 剧情 · ⭐️ 4.5/5</div>
                <div class="record-desc">视角独特且充满隐喻，在逼仄的空间里展现了细腻的情感与对生活的深刻洞察。</div>
            </li>

            <!-- 示例条目 3 -->
            <li class="record-item">
                <div class="record-title">变形金刚起源1</div>
                <div class="record-meta">电影 · 科幻 / 动画 · ⭐️ 4.5/5</div>
                <div class="record-desc">回归赛博坦星球的起源故事，视觉风格焕然一新，为经典IP注入了全新的生命力与史诗感。</div>
            </li>
        </ul>
    </main>

    <footer>
        <a href="index.html">← 返回 Gesso's Space</a>
    </footer>

</body>
</html>
