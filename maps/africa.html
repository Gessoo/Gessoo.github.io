<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非洲分区互动地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin:0; padding:0; font-family:'Microsoft YaHei',sans-serif; }
        #map { height:100vh; width:100%; background:#aad3df; }
        #control-panel {
            position:absolute; top:20px; right:20px; z-index:1000;
            background:white; padding:15px; border-radius:8px;
            box-shadow:0 0 15px rgba(0,0,0,0.2); max-width:220px;
        }
        h3 { margin-top:0; font-size:16px; text-align:center; color:#333; }
        .btn {
            display:block; width:100%; padding:8px 0; margin-bottom:5px;
            border:none; background:#f0f0f0; cursor:pointer;
            border-radius:4px; transition:0.3s; font-size:14px;
            text-align:left; padding-left:10px;
        }
        .btn:hover { background:#e0e0e0; }
        .btn.active { background:#ff5722; color:white; font-weight:bold; }
        #info-box {
            position:absolute; bottom:20px; left:20px; z-index:1000;
            background:rgba(255,255,255,0.9); padding:10px 20px;
            border-radius:4px; box-shadow:0 0 10px rgba(0,0,0,0.1);
            font-size:14px; pointer-events:none;
        }
        .home-link {
            position:absolute; top:20px; left:20px; z-index:1000;
            background:white; padding:8px 14px; border-radius:6px;
            font-size:13px; text-decoration:none; color:#333;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="home-link">🏠 返回首页</a>
    <div id="map"></div>
    <div id="control-panel">
        <h3>🌍 非洲分区</h3>
        <button class="btn" data-region="North Africa" onclick="highlightRegion('North Africa')">北非 (6)</button>
        <button class="btn" data-region="West Africa" onclick="highlightRegion('West Africa')">西非 (16)</button>
        <button class="btn" data-region="Central Africa" onclick="highlightRegion('Central Africa')">中非 (9)</button>
        <button class="btn" data-region="East Africa" onclick="highlightRegion('East Africa')">东非 (18)</button>
        <button class="btn" data-region="South Africa Region" onclick="highlightRegion('South Africa Region')">南非 (5)</button>
        <button class="btn" style="margin-top:10px; border:1px solid #ccc;" onclick="resetMap()">重置视图</button>
    </div>
    <div id="info-box">正在加载非洲边界数据...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 地图初始化：非洲中心 (经度 20，纬度 0)
        var map = L.map('map').setView([0, 20], 4);
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: ['1','2','3','4'],
            attribution: '© 高德地图'
        }).addTo(map);

        // ---------- 非洲区域定义 ----------
        const regions = {
            "North Africa": ["Egypt", "Sudan", "Libya", "Tunisia", "Algeria", "Morocco"],
            "West Africa": [
                "Cabo Verde", "Cape Verde",
                "Mauritania", "Senegal", "Gambia", "The Gambia",
                "Guinea-Bissau", "Guinea", "Sierra Leone", "Liberia",
                "Mali", "Burkina Faso", "Côte d'Ivoire", "Ivory Coast",
                "Ghana", "Togo", "Benin",
                "Niger", "Nigeria"
            ],
            "Central Africa": [
                "Chad", "Cameroon", "Central African Republic",
                "Equatorial Guinea", "Sao Tome and Principe", "São Tomé and Príncipe",
                "Gabon", "Republic of the Congo", "Congo",
                "Democratic Republic of the Congo", "Angola"
            ],
            "East Africa": [
                "Eritrea", "Djibouti", "Somalia",
                "Ethiopia", "Kenya", "United Republic of Tanzania", "Tanzania",
                "South Sudan", "Uganda", "Rwanda", "Burundi",
                "Comoros", "Madagascar", "Seychelles", "Mauritius",
                "Zambia", "Zimbabwe", "Malawi", "Mozambique"
            ],
            "South Africa Region": ["Namibia", "Botswana", "South Africa", "Lesotho", "Eswatini", "Swaziland"]
        };

        const regionNamesCN = {
            "North Africa": "北非",
            "West Africa": "西非",
            "Central Africa": "中非",
            "East Africa": "东非",
            "South Africa Region": "南非"
        };

        // 修正后的国家中英文对照 (增加了坦桑尼亚等别名)
        const countryNamesCN = {
            "Egypt": "埃及", "Sudan": "苏丹", "Libya": "利比亚", "Tunisia": "突尼斯",
            "Algeria": "阿尔及利亚", "Morocco": "摩洛哥",
            "Cabo Verde": "佛得角", "Cape Verde": "佛得角",
            "Mauritania": "毛里塔尼亚", "Senegal": "塞内加尔",
            "Gambia": "冈比亚", "The Gambia": "冈比亚",
            "Guinea-Bissau": "几内亚比绍", "Guinea": "几内亚",
            "Sierra Leone": "塞拉利昂", "Liberia": "利比里亚",
            "Mali": "马里", "Burkina Faso": "布基纳法索",
            "Côte d'Ivoire": "科特迪瓦", "Ivory Coast": "科特迪瓦",
            "Ghana": "加纳", "Togo": "多哥", "Benin": "贝宁",
            "Niger": "尼日尔", "Nigeria": "尼日利亚",
            "Chad": "乍得", "Cameroon": "喀麦隆",
            "Central African Republic": "中非",
            "Equatorial Guinea": "赤道几内亚",
            "Sao Tome and Principe": "圣多美和普林西比",
            "São Tomé and Príncipe": "圣多美和普林西比",
            "Gabon": "加蓬",
            "Republic of the Congo": "刚果（布）", "Congo": "刚果",
            "Democratic Republic of the Congo": "刚果（金）",
            "Angola": "安哥拉",
            "Eritrea": "厄立特里亚", "Djibouti": "吉布提",
            "Somalia": "索马里", "Ethiopia": "埃塞俄比亚",
            "Kenya": "肯尼亚",
            "United Republic of Tanzania": "坦桑尼亚",  // 新增：完整国名
            "Tanzania": "坦桑尼亚",                      // 保留短名
            "South Sudan": "南苏丹", "Uganda": "乌干达",
            "Rwanda": "卢旺达", "Burundi": "布隆迪",
            "Comoros": "科摩罗", "Madagascar": "马达加斯加",
            "Seychelles": "塞舌尔", "Mauritius": "毛里求斯",
            "Zambia": "赞比亚", "Zimbabwe": "津巴布韦",
            "Malawi": "马拉维", "Mozambique": "莫桑比克",
            "Namibia": "纳米比亚", "Botswana": "博茨瓦纳",
            "South Africa": "南非", "Lesotho": "莱索托",
            "Eswatini": "斯威士兰", "Swaziland": "斯威士兰"
        };

        function getCountryCN(eng) {
            return countryNamesCN[eng] || eng;
        }

        let geojsonLayer, currentActiveRegion = null, activeCountryLayers = [], countryClickedFlag = false;

        function defaultStyle() { return { weight:1, color:'#999', dashArray:'3', fillOpacity:0.1, fillColor:'#eee' }; }
        function highlightStyle() { return { weight:2, color:'#666', dashArray:'', fillOpacity:0.6, fillColor:'#ff5722' }; }
        function dimStyle() { return { weight:1, color:'#ccc', dashArray:'', fillOpacity:0.05, fillColor:'#ddd' }; }

        function getRegionByCountry(name) {
            for (let r in regions) if (regions[r].includes(name)) return r;
            return null;
        }

        function resetAllLayersToDefault() {
            if (!geojsonLayer) return;
            geojsonLayer.eachLayer(l => { l.setStyle(defaultStyle()); l.currentlyHighlighted = false; });
            currentActiveRegion = null;
            activeCountryLayers = [];
        }

        window.highlightRegion = function(regionName) {
            if (!geojsonLayer) return;
            const targets = regions[regionName];
            if (!targets) return;
            activeCountryLayers = [];
            currentActiveRegion = regionName;
            document.querySelectorAll('.btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-region') === regionName);
            });
            geojsonLayer.eachLayer(l => {
                const name = l.feature.properties.name || l.feature.properties.ADMIN;
                if (targets.includes(name)) {
                    l.setStyle(highlightStyle());
                    l.currentlyHighlighted = true;
                    l.bringToFront();
                } else {
                    l.setStyle(dimStyle());
                    l.currentlyHighlighted = false;
                }
            });
            document.getElementById('info-box').innerText = `当前展示分区：${regionNamesCN[regionName]}`;
        };

        window.resetMap = function() {
            resetAllLayersToDefault();
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('info-box').innerText = "悬停查看国家，点击国家或按钮高亮区域";
        };

        // 加载 GeoJSON
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(r => r.json())
            .then(data => {
                geojsonLayer = L.geoJson(data, {
                    onEachFeature: function(feature, layer) {
                        layer.on({
                            mouseover: function(e) {
                                const nameEN = feature.properties.name || feature.properties.ADMIN;
                                const regionKey = getRegionByCountry(nameEN);
                                const regionText = regionKey ? ` [${regionNamesCN[regionKey]}]` : "";
                                const nameCN = getCountryCN(nameEN);
                                document.getElementById('info-box').innerText = 
                                    `当前国家：${nameCN} ${nameEN}${regionText}`;
                                if (!layer.currentlyHighlighted) {
                                    layer.setStyle({ weight:2, color:'#444', fillOpacity:0.4, fillColor:'#666' });
                                    layer.bringToFront();
                                }
                            },
                            mouseout: function(e) {
                                if (!layer.currentlyHighlighted) {
                                    if (currentActiveRegion) layer.setStyle(dimStyle());
                                    else layer.setStyle(defaultStyle());
                                } else layer.setStyle(highlightStyle());
                            },
                            click: function(e) {
                                countryClickedFlag = true;
                                setTimeout(() => countryClickedFlag = false, 100);
                                const nameEN = feature.properties.name || feature.properties.ADMIN;
                                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                                geojsonLayer.eachLayer(l => { l.setStyle(defaultStyle()); l.currentlyHighlighted = false; });
                                currentActiveRegion = null;
                                activeCountryLayers = [];
                                layer.setStyle(highlightStyle());
                                layer.currentlyHighlighted = true;
                                layer.bringToFront();
                                activeCountryLayers.push(layer);
                                const regionKey = getRegionByCountry(nameEN);
                                const regionText = regionKey ? ` [${regionNamesCN[regionKey]}]` : "";
                                document.getElementById('info-box').innerText = 
                                    `选中国家：${getCountryCN(nameEN)} ${nameEN}${regionText}`;
                            }
                        });
                    }
                });
                geojsonLayer.eachLayer(l => l.setStyle(defaultStyle()));
                geojsonLayer.addTo(map);
                document.getElementById('info-box').innerText = "数据加载完毕。点击国家或按钮高亮区域";
            })
            .catch(err => {
                console.error(err);
                document.getElementById('info-box').innerText = "错误：无法加载边界数据。";
            });

        map.on('click', function(e) {
            if (countryClickedFlag) return;
            resetMap();
            document.getElementById('info-box').innerText = "未点中国家。请放大地图后点击国家区域内部。";
        });
    </script>
</body>
</html>
